<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${canzone.titolo} + ' - Dettagli'">Dettagli Canzone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #0b0e14; 
            color: white; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('/Immagini/Spring_3.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card-detail { 
            background: rgba(10, 15, 20, 0.9); 
            backdrop-filter: blur(15px);
            border-radius: 20px; 
            padding: 40px; 
            border: 1px solid rgba(0, 210, 255, 0.4);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            width: 90%;
            max-width: 650px;
        }

        .text-info-custom { 
            color: #00d2ff !important; 
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }

        .custom-label {
            color: #bdc3c7 !important; 
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .data-value {
            color: #ffffff;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .badge-cat { 
            background-color: rgba(0, 210, 255, 0.15); 
            color: #00d2ff; 
            border: 1px solid #00d2ff;
            padding: 8px 15px;
            font-size: 0.9rem;
        }

        .btn-cyber-warning {
            background: transparent;
            color: #ffc107 !important;
            border: 1px solid #ffc107;
            padding: 10px 30px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-cyber-warning:hover {
            background: #ffc107;
            color: black !important;
            box-shadow: 0 0 15px #ffc107;
        }

        .btn-home {
            border: 1px solid rgba(0, 210, 255, 0.5);
            color: #00d2ff;
        }
    </style>
</head>
<body class="container">

    <div class="glass-card-detail">
        
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="h2 text-info-custom">🔍 ANALISI TRACCIA</h1>
            <a th:href="@{/}" class="btn btn-home btn-sm px-3">🏠 Home</a>
        </div>

        <div class="p-4 rounded-3" style="background-color: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);">
            
            <span class="custom-label">TITOLO CANZONE</span>
            <div class="data-value" th:text="${canzone.titolo}">Titolo</div>
            
            <span class="custom-label">ARTISTA / AUTORE</span>
            <div class="data-value text-info-custom" th:text="${canzone.autore}">Autore</div>
            
            <span class="custom-label">ANNO DI RILASCIO</span>
            <div class="data-value" th:text="${canzone.anno != null ? canzone.anno : 'Non specificato'}">1986</div>
            
            <span class="custom-label">GENERI MUSICALI</span>
            <div class="mt-2">
                <span th:each="cat : ${canzone.categorie}" class="badge badge-cat me-2" th:text="${cat}"></span>
                <span th:if="${canzone.categorie == null || canzone.categorie.isEmpty()}" class="text-muted">Nessun genere assegnato</span>
            </div>
        </div>

        <div class="mt-5 pt-3 border-top border-secondary text-center">
            <span class="custom-label mb-2">IDENTIFICATIVO UNIVOCO DI SISTEMA</span>
            <p class="small font-monospace text-muted" style="font-size: 0.8rem;" th:text="${canzone.codice}">UUID</p>
            
            <div class="mt-4">
                <a th:href="@{/edit/{id}(id=${canzone.codice})}" class="btn btn-cyber-warning">MODIFICA DATI</a>
            </div>
        </div>
    </div>

</body>
</html>
