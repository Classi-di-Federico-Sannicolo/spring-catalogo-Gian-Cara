<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestione Canzone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; color: #333; }
        .card { border-radius: 15px; border: none; }
        .btn-info { background-color: #00d2ff; border: none; color: white; }
        .btn-info:hover { background-color: #0099cc; color: white; }
    </style>
</head>
<body class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="${canzone.codice == null || canzone.codice == ''} ? '🆕 Nuova Canzone' : '📝 Modifica'"></h2>
                <a th:href="@{/}" class="btn btn-outline-secondary">🏠 Home</a>
            </div>

            <form th:action="@{/save}" th:object="${canzone}" method="post" class="card p-4 shadow-sm">
                <input type="hidden" th:field="*{codice}">

                <div class="mb-3">
                    <label class="form-label fw-bold">Titolo</label>
                    <input type="text" th:field="*{titolo}" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Artista</label>
                    <input type="text" th:field="*{autore}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Anno</label>
                    <input type="number" th:field="*{anno}" class="form-control" min="0">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Generi</label>
                    <div class="row g-2">
                        <div th:each="g : ${generi}" class="col-6 col-md-3">
                            <div class="form-check border p-1 rounded">
                                <input class="form-check-input ms-1" type="checkbox" th:field="*{categorie}" th:value="${g}">
                                <label class="form-check-label ms-1" th:text="${g}"></label>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-info btn-lg w-100 fw-bold mt-3">Salva</button>
            </form>
        </div>
    </div>
</body>
</html>
