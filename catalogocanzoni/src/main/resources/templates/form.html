<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nuova Canzone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Aggiungi Canzone</h2>
        <a th:href="@{/}" class="btn btn-outline-secondary">🏠 Home</a>
    </div>

    <form th:action="@{/save}" th:object="${canzone}" method="post" class="card p-4 shadow-sm">
        <div class="mb-3">
            <label class="form-label fw-bold">Titolo della Canzone:</label>
            <input type="text" th:field="*{titolo}" class="form-control" placeholder="Esempio: Imagine" required>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-bold">Autore / Gruppo:</label>
            <input type="text" th:field="*{autore}" class="form-control" placeholder="Esempio: John Lennon" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Anno di uscita:</label>
            <input type="number" th:field="*{anno}" class="form-control" min="1900" max="2026">
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Seleziona Categorie:</label><br>
            <div class="row">
                <div th:each="g : ${generi}" class="col-md-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" th:field="*{categorie}" th:value="${g}">
                        <label class="form-check-label" th:text="${g}"></label>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary w-100">Salva nel Catalogo</button>
        </div>
    </form>
</body>
</html>
