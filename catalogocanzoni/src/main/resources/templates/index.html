<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Catalogo Canzoni</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .table-custom tbody tr:nth-of-type(odd) { background-color: #f8faff; }
        .table-custom tbody tr:nth-of-type(even) { background-color: #ffffff; }
        .table-custom tr { border-bottom: 2px solid #dee2e6; vertical-align: middle; }
        .badge-cat { background-color: #6c757d; color: white; margin-right: 4px; }
    </style>
</head>
<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>🎵 Catalogo Canzoni</h1>
        <a th:href="@{/}" class="btn btn-outline-primary">🏠 Home</a>
    </div>

    <form th:action="@{/}" method="get" class="mb-4 d-flex gap-2">
        <input type="text" name="search" class="form-control" placeholder="Cerca titolo canzone...">
        <button type="submit" class="btn btn-primary">Cerca</button>
    </form>

    <table class="table table-custom">
        <thead class="table-dark">
            <tr>
                <th>Titolo</th>
                <th>Autore</th>
                <th>Categorie</th>
                <th>Azioni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${canzoni}">
                <td><a th:href="@{/item/{id}(id=${c.codice})}" th:text="${c.titolo}" class="fw-bold text-decoration-none"></a></td>
                <td th:text="${c.autore}"></td>
                <td>
                    <span th:each="cat : ${c.categorie}" class="badge badge-cat" th:text="${cat}"></span>
                </td>
                <td>
                    <a th:href="@{/edit/{id}(id=${c.codice})}" class="btn btn-sm btn-warning me-2">Modifica</a>
                    <a th:href="@{/delete/{id}(id=${c.codice})}" class="btn btn-sm btn-danger" onclick="return confirm('Eliminare questa canzone?')">Elimina</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="mt-4">
        <a th:href="@{/new}" class="btn btn-success">➕ Aggiungi Nuova Canzone</a>
        <a th:href="@{/clear}" class="btn btn-danger float-end" onclick="return confirm('Svuotare tutto il catalogo?')">🗑️ Svuota Tutto</a>
    </div>
</body>
</html>
