<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Music Catalog Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Definizione del tema grafico scuro con sfondo personalizzato */
        body { 
            background-color: #0b0e14; 
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('/Immagini/Srping.png'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            min-height: 100vh; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
        }
        /* Card con effetto trasparenza (glassmorphism) */
        .glass-card { 
            background: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(12px); 
            border-radius: 15px; 
            padding: 25px; 
            border: 1px solid rgba(0, 210, 255, 0.3); 
        }
        /* Personalizzazione testata e celle della tabella */
        .table-custom th { color: #00d2ff !important; text-transform: uppercase; font-size: 0.85rem; }
        .table-custom td { background-color: transparent !important; color: #e0e0e0 !important; vertical-align: middle; }
        .table-custom a { color: #00d2ff !important; text-decoration: none; font-weight: 600; }
        
        /* Stili per i pulsanti personalizzati (Modifica ed Elimina) */
        .btn-cyber-warning { background: rgba(255, 193, 7, 0.1); color: #ffc107 !important; border: 1px solid #ffc107; }
        .btn-cyber-danger { background: rgba(220, 53, 69, 0.1); color: #dc3545 !important; border: 1px solid #dc3545; }
        .badge-cat { background: rgba(0, 210, 255, 0.1); color: #00d2ff; border: 1px solid rgba(0, 210, 255, 0.5); }
    </style>
</head>
<body class="container mt-5">
    <div class="glass-card mb-4">
        <h1 class="h2 mb-4" style="color: #00d2ff;">🎵 Catalogo Canzoni</h1>
        
        <form th:action="@{/}" method="get" class="row g-3 p-3 rounded-3" style="background-color: rgba(0,0,0,0.5);">
            <div class="col-md-4">
                <label class="form-label fw-bold small" style="color: #00d2ff;">Titolo o Autore</label>
                <input type="text" name="search" class="form-control bg-dark text-white border-secondary" th:value="${param.search}" placeholder="Cerca...">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold small" style="color: #00d2ff;">Anno</label>
                <input type="number" name="anno" class="form-control bg-dark text-white border-secondary" th:value="${param.anno}" placeholder="Es: 2024">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold small" style="color: #00d2ff;">Genere</label>
                <select name="genere" class="form-select bg-dark text-white border-secondary">
                    <option value="">Tutti i generi</option>
                    <option th:each="g : ${generi}" th:value="${g}" th:text="${g}" th:selected="${param.genere != null && param.genere[0] == g}"></option>
                </select>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-info w-100 fw-bold text-white">FILTRA</button>
            </div>
        </form>
    </div>

    <div class="glass-card p-0 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-custom mb-0">
                <thead>
                    <tr>
                        <th>Titolo</th>
                        <th>Autore</th>
                        <th>Anno</th>
                        <th>Generi</th>
                        <th class="text-end">Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(canzoni)}">
                        <td colspan="5" class="text-center py-5 text-muted">Nessuna canzone trovata nel catalogo.</td>
                    </tr>
                    <tr th:each="c : ${canzoni}">
                        <td><a th:href="@{/item/{id}(id=${c.codice})}" th:text="${c.titolo}"></a></td>
                        <td th:text="${c.autore}"></td>
                        <td th:text="${c.anno != null ? c.anno : '-'}"></td>
                        <td>
                            <span th:each="cat : ${c.categorie}" class="badge badge-cat me-1" th:text="${cat}"></span>
                        </td>
                        <td class="text-end">
                            <a th:href="@{/edit/{id}(id=${c.codice})}" class="btn btn-cyber-warning btn-sm me-1">MODIFICA</a>
                            <a th:href="@{/delete/{id}(id=${c.codice})}" class="btn btn-cyber-danger btn-sm" onclick="return confirm('Vuoi davvero eliminare questa traccia?')">ELIMINA</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 d-flex justify-content-between pb-5">
        <a th:href="@{/new}" class="btn btn-success fw-bold px-4">➕ AGGIUNGI TRACCIA</a>
        <a th:href="@{/clear}" class="btn btn-outline-danger btn-sm" onclick="return confirm('ATTENZIONE: Questa azione svuoterà l\'intero catalogo. Procedere?')">SVUOTA CATALOGO</a>
    </div>
</body>
</html>
